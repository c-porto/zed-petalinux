INIT_MANAGER_DEFAULT:forcevariable = "systemd"
IMAGE_FEATURES:remove = "ssh-server-dropbear"
IMAGE_INSTALL:append = " libiio-dev \
                         libiio \
                         libiio-tests \
                         libiio-iiod \
                         libcsp \
                         libcsp-dev \
                         libcsp-examples \
                         dtoverlay \
                         usb-ether \
                         fsatutils \
                         nlohmann-json-dev \
                         fsat2-engine \
                         sqlite3"

IMAGE_BOOT_FILES:zynq = "BOOT.BIN boot.scr uImage"

PARALLEL_MAKE ?= "-j 10"
BB_NUMBER_THREADS ?= "12"

DL_DIR = "/home/petalinux/sstate/downloads"
SSTATE_DIR = "/home/petalinux/sstate/sstate-cache/arm"
